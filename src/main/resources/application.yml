spring:
  application:
    name: novabank

  datasource:
    url: ${NOVABANK_DB_URL:jdbc:postgresql://localhost:5432/novabank}
    username: ${NOVABANK_DB_USER:postgres}
    password: ${NOVABANK_DB_PASSWORD:usuario}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:novabank-development-secret-key-change-me}
  expiration: ${JWT_EXPIRATION:86400000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

---
spring:
  config:
    activate:
      on-profile: h2

  datasource:
    url: jdbc:h2:mem:novabank_h2;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

  h2:
    console:
      enabled: true
      path: /h2-console