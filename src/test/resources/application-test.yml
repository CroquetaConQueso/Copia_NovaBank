spring:
  datasource:
    url: jdbc:h2:mem:novabank_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  sql:
    init:
      mode: never

jwt:
  secret: novabank-test-secret-key-with-at-least-32-chars
  expiration: 86400000
